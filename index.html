<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c12">
    <title>Kuba Trening - Smart History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c12; --card-bg: #161a26; --accent: #3b82f6;
            --success: #10b981; --danger: #ef4444; --text-main: #ffffff;
            --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.12);
            --radius-lg: 24px; --radius-md: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; padding-bottom: env(safe-area-inset-bottom); }

        .hidden { display: none !important; }

        .header { padding: 60px 24px 20px; }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        .header h1 span { color: var(--accent); }

        .week-selector { display: flex; gap: 12px; padding: 0 24px 24px; overflow-x: auto; scrollbar-width: none; }
        .week-btn {
            padding: 10px 20px; border-radius: 25px; background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text-dim); font-size: 14px; font-weight: 600; white-space: nowrap; transition: 0.3s;
        }
        .week-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        .day-grid { padding: 0 24px; display: grid; gap: 16px; }
        .day-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 24px;
            display: flex; align-items: center; gap: 20px; border: 1px solid var(--border);
        }

        .nav-bar {
            position: sticky; top: 0; background: rgba(10, 12, 18, 0.95); backdrop-filter: blur(15px);
            padding: 50px 24px 20px; display: flex; align-items: center; gap: 15px; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .btn-back { width: 44px; height: 44px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border); color: white; font-size: 20px; border: none; }

        .exercise-card { background: var(--card-bg); border-radius: var(--radius-lg); margin-bottom: 25px; border: 1px solid var(--border); overflow: hidden; }
        .exercise-header { padding: 20px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.02); }
        .ex-circle { width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--accent); }

        .set-row { padding: 20px; display: grid; grid-template-columns: 40px 1fr 1fr 54px; gap: 12px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .set-row:last-child { border-bottom: none; }

        .input-group { position: relative; }
        .input-group span { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 9px; color: var(--text-dim); font-weight: 800; }

        input {
            width: 100%; background: #000; border: 1.5px solid var(--border); color: white;
            padding: 14px 10px; border-radius: 12px; text-align: center;
            font-family: 'JetBrains Mono'; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-check { height: 50px; border-radius: 12px; background: var(--border); border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; }
        .btn-check.done { background: var(--success); color: white; }

        .set-info-bar {
            grid-column: 1 / 5; display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 10px;
        }
        .prev-label { font-size: 11px; color: var(--text-dim); }
        .prev-label b { color: var(--text-main); font-family: 'JetBrains Mono'; margin-left: 4px; }

        .trend-badge { font-size: 10px; font-weight: 900; }
        .t-up { color: var(--success); }
        .t-down { color: var(--danger); }
        .t-eq { color: var(--text-dim); font-size: 18px; font-weight: 900; }

        .footer-stats {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 26, 38, 0.98); padding: 20px 30px calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border); display: flex; justify-content: space-between; backdrop-filter: blur(20px);
        }
        .stat-val { font-size: 22px; font-weight: 800; display: block; }
        .stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        .workout-date-tag { font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 4px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="screen-home">
    <div class="header"><h1>Trening<span>.</span></h1></div>
    <div class="week-selector" id="week-tabs"></div>
    <div class="day-grid" id="day-cards"></div>
</div>

<div id="screen-workout" class="hidden">
    <div class="nav-bar">
        <button class="btn-back" onclick="goHome()">←</button>
        <div>
            <h2 id="wh-title" style="font-size: 18px; letter-spacing: -0.5px;"></h2>
            <span id="wh-date" class="workout-date-tag"></span>
        </div>
        <button onclick="resetWorkout()" style="margin-left: auto; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800;">RESET</button>
    </div>
    <div id="workout-scroll" style="padding: 20px; padding-bottom: 140px;"></div>
    <div class="footer-stats">
        <div style="text-align:center"><span id="s-done" class="stat-val">0</span><span class="stat-lab">Serie</span></div>
        <div style="text-align:center"><span id="s-pct" class="stat-val">0%</span><span class="stat-lab">Zrobione</span></div>
    </div>
</div>

<script>
    const DAYS = [
        { 
            id:0, weekday:0, name:"Niedziela", label:"PUSH", icon:"🔥", color:"#ff3b30", 
            exercises: [
                {name:"Incline Dumbbell Press", sets:4, tag:"CHEST"},
                {name:"Seated Dumbbell OHP", sets:3, tag:"SHOULDER"},
                {name:"Machine Chest Press", sets:3, tag:"CHEST"},
                {name:"Chest Dips", sets:3, tag:"CHEST"},
                {name:"Dumbbell Lateral Raises", sets:4, tag:"DELTS"},
                {name:"Ab Wheel", sets:3, tag:"CORE"},
                {name:"Dumbbell Side Bend", sets:3, tag:"CORE"}
            ]
        },
        { 
            id:1, weekday:1, name:"Poniedziałek", label:"PULL", icon:"💪", color:"#00b4d8", 
            exercises: [
                {name:"Weighted Pull Ups", sets:4, tag:"BACK"},
                {name:"Single-Arm DB Row", sets:4, tag:"BACK"},
                {name:"Seated Cable Row", sets:3, tag:"BACK"},
                {name:"Reverse Peck Deck", sets:4, tag:"REAR"},
                {name:"Dumbbell Shrugs", sets:3, tag:"TRAPS"},
                {name:"Ez-bar Reverse Curl", sets:3, tag:"FOREARMS"},
                {name:"Barbell Wrist Curl", sets:3, tag:"FOREARMS"}
            ]
        },
        { 
            id:2, weekday:3, name:"Środa", label:"LEGS + ARMS", icon:"🦵", color:"#2ec4b6", 
            exercises: [
                {name:"Hip Thrust", sets:4, tag:"GLUTES"},
                {name:"Hack Squat / Leg Press", sets:3, tag:"QUADS"},
                {name:"RDL", sets:3, tag:"LEGS"},
                {name:"Seated Leg Curl", sets:3, tag:"HAM"},
                {name:"Supination Curl [SS]", sets:3, tag:"BICEPS"},
                {name:"Single-Arm Cable Pushdown [SS]", sets:3, tag:"TRICEPS"},
                {name:"Cross-Body Hammer Curl [SS]", sets:3, tag:"BICEPS"},
                {name:"Calf Raises [SS]", sets:4, tag:"CALVES"}
            ]
        },
        { 
            id:3, weekday:5, name:"Piątek", label:"UPPER", icon:"⚡", color:"#9d4edd", 
            exercises: [
                {name:"Dumbbell Press", sets:3, tag:"CHEST"},
                {name:"Cable Flyes (Low to High)", sets:3, tag:"CHEST"},
                {name:"Single-Arm Lat Pulldown", sets:3, tag:"BACK"},
                {name:"Cable Lateral Raise", sets:4, tag:"DELTS"},
                {name:"EZ-bar Preacher Curl", sets:3, tag:"BICEPS"},
                {name:"Incline Skull Crushers", sets:3, tag:"TRICEPS"},
                {name:"Cable Crunch", sets:4, tag:"CORE"}
            ]
        }
    ];

    let state = JSON.parse(localStorage.getItem('kuba_v11') || '{"currentWeekIndex":0, "weeks":[{}], "startSunday":0}');
    let currentDayId = null;
    
    function save() { localStorage.setItem('kuba_v11', JSON.stringify(state)); }

    function updateTimeline() {
        const now = new Date();
        const day = now.getDay();
        
        const currentSunday = new Date(now);
        currentSunday.setDate(now.getDate() - day);
        currentSunday.setHours(0, 0, 0, 0);
        const currentSundayTime = currentSunday.getTime();

        if (!state.startSunday) {
            state.startSunday = currentSundayTime;
            state.weeks = [{}];
            state.currentWeekIndex = 0;
            save();
            return;
        }

        if (currentSundayTime >= state.startSunday) {
            const msPerWeek = 7 * 24 * 60 * 60 * 1000;
            const elapsedWeeks = Math.floor((currentSundayTime - state.startSunday) / msPerWeek);
            
            const oldLength = state.weeks.length;
            while (state.weeks.length <= elapsedWeeks) {
                state.weeks.push({});
            }

            if (state.weeks.length > oldLength) {
                state.currentWeekIndex = state.weeks.length - 1;
            }
            save();
        }
    }

    function renderHome() {
        document.getElementById('week-tabs').innerHTML = state.weeks.map((_, w) => `
            <button class="week-btn ${state.currentWeekIndex===w?'active':''}" onclick="setWeek(${w})">TYDZIEŃ ${w+1}</button>
        `).join('');
        
        document.getElementById('day-cards').innerHTML = DAYS.map(day => `
            <div class="day-card" onclick="openDay(${day.id})">
                <div style="font-size:28px; width:56px; height:56px; background:rgba(255,255,255,0.05); border-radius:16px; display:flex; align-items:center; justify-content:center; color:${day.color}">${day.icon}</div>
                <div><h3 style="font-size:20px; font-weight:800">${day.name}</h3><p style="font-size:13px; color:var(--text-dim); font-weight:600">${day.label}</p></div>
            </div>
        `).join('');
    }

    function setWeek(w) { state.currentWeekIndex = w; save(); renderHome(); }

    function openDay(id) {
        currentDayId = id;
        const weekData = state.weeks[state.currentWeekIndex];
        const dayKey = `day_${id}_date`;

        if (!weekData[dayKey]) {
            const now = new Date();
            weekData[dayKey] = now.toLocaleDateString('pl-PL', { day:'numeric', month:'long', weekday:'short' });
            save();
        }

        document.getElementById('wh-title').textContent = DAYS[id].label;
        document.getElementById('wh-date').textContent = weekData[dayKey];
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-workout').classList.remove('hidden');
        renderWorkout(); updateSummary();
    }

    function getTrendUI(curr, prev) {
        if (!prev || !prev.done || !curr.done) return '<span class="t-eq">──</span>';
        const cKg = parseFloat(curr.kg) || 0; const pKg = parseFloat(prev.kg) || 0;
        const cR = parseFloat(curr.reps) || 0; const pR = parseFloat(prev.reps) || 0;
        if (cKg > pKg) return '<span class="t-up">▲ CIĘŻAR</span>';
        if (cKg < pKg) return '<span class="t-down">▼ CIĘŻAR</span>';
        if (cR > pR) return '<span class="t-up">▲ POWT.</span>';
        if (cR < pR) return '<span class="t-down">▼ POWT.</span>';
        return '<span class="t-eq">〓</span>';
    }

    function renderWorkout() {
        const day = DAYS[currentDayId];
        const weekData = state.weeks[state.currentWeekIndex];
        const prevWeekData = state.currentWeekIndex > 0 ? state.weeks[state.currentWeekIndex - 1] : null;

        document.getElementById('workout-scroll').innerHTML = day.exercises.map((ex, ei) => {
            const key = `d${currentDayId}_e${ei}`;
            if(!weekData[key]) weekData[key] = Array.from({length:ex.sets}, () => ({kg:0, reps:0, done:false}));
            const sets = weekData[key];
            const prevSets = prevWeekData ? prevWeekData[key] : null;

            return `
                <div class="exercise-card">
                    <div class="exercise-header">
                        <div class="ex-circle">${sets.filter(s=>s.done).length}/${ex.sets}</div>
                        <div style="flex:1"><h4>${ex.name}</h4><p style="font-size:12px; color:var(--text-dim); font-weight:600">${ex.tag}</p></div>
                    </div>
                    <div>
                        ${sets.map((s, i) => {
                            const prev = prevSets && prevSets[i] ? prevSets[i] : null;
                            const prevTxt = prev ? `<b>${prev.kg}kg × ${prev.reps}</b>` : '—';
                            return `
                                <div class="set-row">
                                    <span style="font-size:12px; color:var(--text-dim); font-weight:900">S${i+1}</span>
                                    <div class="input-group"><input type="number" value="${s.kg||''}" placeholder="0" oninput="updateSet(${ei},${i},'kg',this.value)"><span>KG</span></div>
                                    <div class="input-group"><input type="number" value="${s.reps||''}" placeholder="0" oninput="updateSet(${ei},${i},'reps',this.value)"><span>POW</span></div>
                                    <button class="btn-check ${s.done?'done':''}" onclick="toggleSet(this,${ei},${i})">✓</button>
                                    <div class="set-info-bar">
                                        <span class="prev-label">Ostatnio: ${prevTxt}</span>
                                        <span class="trend-badge">${getTrendUI(s, prev)}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateSet(ei, i, field, val) { state.weeks[state.currentWeekIndex][`d${currentDayId}_e${ei}`][i][field] = parseFloat(val) || 0; save(); }
    
    function toggleSet(btn, ei, i) {
        const set = state.weeks[state.currentWeekIndex][`d${currentDayId}_e${ei}`][i];
        set.done = !set.done; save(); updateSummary(); renderWorkout();
    }

    function updateSummary() {
        const weekData = state.weeks[state.currentWeekIndex];
        let total = 0, done = 0;
        Object.keys(weekData).forEach(key => { if(key.startsWith(`d${currentDayId}_`)) weekData[key].forEach(s => { total++; if(s.done) done++; })});
        document.getElementById('s-done').textContent = done;
        document.getElementById('s-pct').textContent = total ? Math.round((done/total)*100)+'%' : '0%';
    }

    function goHome() { document.getElementById('screen-home').classList.remove('hidden'); document.getElementById('screen-workout').classList.add('hidden'); renderHome(); }

    function resetWorkout() {
        const weekData = state.weeks[state.currentWeekIndex];
        if (!weekData) return;

        delete weekData[`day_${currentDayId}_date`];

        Object.keys(weekData).forEach(key => {
            if (key.startsWith(`d${currentDayId}_`)) {
                delete weekData[key];
            }
        });

        save();
        openDay(currentDayId);
    }

    updateTimeline();
    renderHome();
</script>
</body>
</html>
