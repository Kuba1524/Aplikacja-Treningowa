<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <title>Kuba Trening - Pro Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #151a23;
            --card-inner: #1c222d;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.08);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        .hidden { display: none !important; }

        /* HEADER & TABS */
        .header { padding: 50px 20px 16px; }
        .header h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
        .header h1 span { color: var(--accent); }

        .week-selector { display: flex; gap: 8px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
        .week-btn {
            padding: 8px 16px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text-dim); font-size: 13px; font-weight: 700; white-space: nowrap; transition: 0.2s;
        }
        .week-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        /* DAY CARDS (HOME) */
        .day-grid { padding: 0 20px; display: grid; gap: 14px; }
        .day-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border);
            cursor: pointer; transition: transform 0.1s;
        }
        .day-card:active { transform: scale(0.98); }
        .day-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
        .day-label { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-top: 2px; }

        /* WORKOUT SCREEN */
        .nav-bar {
            position: sticky; top: 0; background: rgba(11, 14, 20, 0.92); backdrop-filter: blur(12px);
            padding: 45px 20px 15px; display: flex; align-items: center; gap: 12px; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .btn-back { width: 38px; height: 38px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--border); color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        .exercise-card { background: var(--card-bg); border-radius: var(--radius-lg); margin-bottom: 20px; border: 1px solid var(--border); overflow: hidden; }
        .exercise-header { padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.015); border-bottom: 1px solid var(--border); }
        
        /* TAGI / BADGE */
        .tag-badge {
            font-size: 10px; font-weight: 800; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 4px;
            text-transform: uppercase; display: inline-block;
        }
        .tag-CHEST { background: rgba(225, 29, 72, 0.15); color: #fda4af; border: 1px solid rgba(225, 29, 72, 0.3); }
        .tag-BACK { background: rgba(14, 165, 233, 0.15); color: #7dd3fc; border: 1px solid rgba(14, 165, 233, 0.3); }
        .tag-SHOULDER, .tag-DELTS, .tag-REAR { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); }
        .tag-CORE { background: rgba(234, 179, 8, 0.15); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }
        .tag-TRAPS, .tag-FOREARMS { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3); }
        .tag-GLUTES, .tag-QUADS, .tag-LEGS, .tag-HAM, .tag-CALVES { background: rgba(20, 184, 166, 0.15); color: #5eead4; border: 1px solid rgba(20, 184, 166, 0.3); }
        .tag-BICEPS, .tag-TRICEPS { background: rgba(249, 115, 22, 0.15); color: #fdba74; border: 1px solid rgba(249, 115, 22, 0.3); }

        .ex-title { font-size: 15px; font-weight: 700; color: #fff; margin-left: 10px; }
        .ex-circle { font-size: 12px; font-weight: 800; color: var(--accent); background: rgba(59, 130, 246, 0.1); padding: 4px 10px; border-radius: 12px; }

        /* BUTTON NOTATKI & PASEK KOMENTARZA */
        .btn-note-toggle {
            background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 600;
            padding: 8px 18px 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: 0.2s;
        }
        .btn-note-toggle.active { color: var(--accent); }
        
        .note-box { padding: 0 18px 12px; }
        .note-input {
            width: 100%; background: var(--card-inner); border: 1px solid var(--border); color: #fff;
            padding: 8px 12px; border-radius: var(--radius-md); font-size: 12px; font-family: inherit;
            outline: none; resize: none; transition: 0.2s;
        }
        .note-input:focus { border-color: var(--accent); }

        /* SERIE LAYOUT */
        .set-row { padding: 12px 18px; display: grid; grid-template-columns: 32px 1fr 1fr 48px; gap: 10px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .set-row:last-child { border-bottom: none; }

        .input-group { position: relative; }
        .input-group span { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 9px; color: var(--text-dim); font-weight: 800; pointer-events: none; }

        input[type="number"] {
            width: 100%; background: var(--card-inner); border: 1px solid var(--border); color: #fff;
            padding: 10px 6px; border-radius: var(--radius-md); text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; outline: none; transition: 0.2s;
        }
        input[type="number"]:focus { border-color: var(--accent); background: #000; }

        .btn-check { height: 42px; border-radius: var(--radius-md); background: var(--card-inner); border: 1px solid var(--border); color: var(--text-dim); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-check.done { background: var(--success); color: white; border-color: var(--success); }

        .set-info-bar {
            grid-column: 1 / 5; display: flex; justify-content: space-between; align-items: center;
            margin-top: 4px; padding: 6px 10px; background: rgba(0,0,0,0.2); border-radius: 8px;
        }
        .prev-label { font-size: 11px; color: var(--text-dim); }
        .prev-label b { color: #fff; font-family: 'JetBrains Mono', monospace; margin-left: 4px; }

        .trend-badge { font-size: 10px; font-weight: 800; }
        .t-up { color: var(--success); }
        .t-down { color: var(--danger); }
        .t-eq { color: var(--text-dim); }

        /* FOOTER STATS */
        .footer-stats {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 20, 28, 0.95); padding: 16px 30px calc(16px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; backdrop-filter: blur(15px);
        }
        .stat-val { font-size: 20px; font-weight: 800; display: block; font-family: 'JetBrains Mono', monospace; }
        .stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        .workout-date-tag { font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 2px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="screen-home">
    <div class="header"><h1>Plan <span>Treningowy</span></h1></div>
    <div class="week-selector" id="week-tabs"></div>
    <div class="day-grid" id="day-cards"></div>
</div>

<div id="screen-workout" class="hidden">
    <div class="nav-bar">
        <button class="btn-back" onclick="goHome()">←</button>
        <div>
            <h2 id="wh-title" style="font-size: 17px; font-weight: 800;"></h2>
            <span id="wh-date" class="workout-date-tag"></span>
        </div>
        <button onclick="resetWorkout()" style="margin-left: auto; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 800;">RESET</button>
    </div>
    <div id="workout-scroll" style="padding: 16px; padding-bottom: 120px;"></div>
    <div class="footer-stats">
        <div style="text-align:center"><span id="s-done" class="stat-val">0</span><span class="stat-lab">Ukończone Serie</span></div>
        <div style="text-align:center"><span id="s-pct" class="stat-val">0%</span><span class="stat-lab">Postęp Treningu</span></div>
    </div>
</div>

<script>
    const DAYS = [
        { 
            id:0, weekday:0, name:"Niedziela", label:"PUSH", icon:"🔥", color:"#ff3b30", 
            exercises: [
                {name:"Incline Dumbbell Press", sets:4, tag:"CHEST"},
                {name:"Seated Dumbbell OHP", sets:3, tag:"SHOULDER"},
                {name:"Machine Chest Press", sets:3, tag:"CHEST"},
                {name:"Chest Dips", sets:3, tag:"CHEST"},
                {name:"Dumbbell Lateral Raises", sets:4, tag:"DELTS"},
                {name:"Ab Wheel", sets:3, tag:"CORE"},
                {name:"Dumbbell Side Bend", sets:3, tag:"CORE"}
            ]
        },
        { 
            id:1, weekday:1, name:"Poniedziałek", label:"PULL", icon:"💪", color:"#00b4d8", 
            exercises: [
                {name:"Weighted Pull Ups", sets:4, tag:"BACK"},
                {name:"Chest Supported Row", sets:4, tag:"BACK"},
                {name:"Seated Cable Row", sets:3, tag:"BACK"},
                {name:"Reverse Peck Deck", sets:4, tag:"REAR"},
                {name:"Dumbbell Shrugs", sets:3, tag:"TRAPS"},
                {name:"Ez-bar Reverse Curl", sets:3, tag:"FOREARMS"},
                {name:"Barbell Wrist Curl", sets:3, tag:"FOREARMS"}
            ]
        },
        { 
            id:2, weekday:3, name:"Środa", label:"LEGS + ARMS", icon:"🦵", color:"#2ec4b6", 
            exercises: [
                {name:"Hip Thrust", sets:4, tag:"GLUTES"},
                {name:"Hack Squat / Leg Press", sets:3, tag:"QUADS"},
                {name:"RDL", sets:3, tag:"LEGS"},
                {name:"Seated Leg Curl", sets:3, tag:"HAM"},
                {name:"Supination Curl [SS]", sets:3, tag:"BICEPS"},
                {name:"Single-Arm Cable Pushdown [SS]", sets:3, tag:"TRICEPS"},
                {name:"Cross-Body Hammer Curl [SS]", sets:3, tag:"BICEPS"},
                {name:"Calf Raises [SS]", sets:4, tag:"CALVES"}
            ]
        },
        { 
            id:3, weekday:5, name:"Piątek", label:"UPPER", icon:"⚡", color:"#9d4edd", 
            exercises: [
                {name:"Dumbbell Press", sets:3, tag:"CHEST"},
                {name:"Cable Flyes (Low to High)", sets:3, tag:"CHEST"},
                {name:"Single-Arm Lat Pulldown", sets:3, tag:"BACK"},
                {name:"Cable Lateral Raise", sets:4, tag:"DELTS"},
                {name:"EZ-bar Preacher Curl", sets:3, tag:"BICEPS"},
                {name:"Incline Skull Crushers", sets:3, tag:"TRICEPS"},
                {name:"Cable Crunch", sets:4, tag:"CORE"}
            ]
        }
    ];

    let state = JSON.parse(localStorage.getItem('kuba_v11') || '{"currentWeekIndex":0, "weeks":[{}], "startSunday":0}');
    let currentDayId = null;
    
    function save() { localStorage.setItem('kuba_v11', JSON.stringify(state)); }

    function updateTimeline() {
        const now = new Date();
        const day = now.getDay();
        
        const currentSunday = new Date(now);
        currentSunday.setDate(now.getDate() - day);
        currentSunday.setHours(0, 0, 0, 0);
        const currentSundayTime = currentSunday.getTime();

        if (!state.startSunday) {
            state.startSunday = currentSundayTime;
            state.weeks = [{}];
            state.currentWeekIndex = 0;
            save();
            return;
        }

        if (currentSundayTime >= state.startSunday) {
            const msPerWeek = 7 * 24 * 60 * 60 * 1000;
            const elapsedWeeks = Math.floor((currentSundayTime - state.startSunday) / msPerWeek);
            
            const oldLength = state.weeks.length;
            while (state.weeks.length <= elapsedWeeks) {
                state.weeks.push({});
            }

            if (state.weeks.length > oldLength) {
                state.currentWeekIndex = state.weeks.length - 1;
            }
            save();
        }
    }

    function renderHome() {
        document.getElementById('week-tabs').innerHTML = state.weeks.map((_, w) => `
            <button class="week-btn ${state.currentWeekIndex===w?'active':''}" onclick="setWeek(${w})">TYDZIEŃ ${w+1}</button>
        `).join('');
        
        document.getElementById('day-cards').innerHTML = DAYS.map(day => `
            <div class="day-card" onclick="openDay(${day.id})">
                <div>
                    <div class="day-title">${day.label}</div>
                    <div class="day-label">${day.name} • ${day.exercises.length} ćwiczeń</div>
                </div>
                <div style="font-size:20px;">${day.icon}</div>
            </div>
        `).join('');
    }

    function setWeek(w) { state.currentWeekIndex = w; save(); renderHome(); }

    function openDay(id) {
        currentDayId = id;
        const weekData = state.weeks[state.currentWeekIndex];
        const dayKey = `day_${id}_date`;

        if (!weekData[dayKey]) {
            const now = new Date();
            weekData[dayKey] = now.toLocaleDateString('pl-PL', { day:'numeric', month:'long', weekday:'short' });
            save();
        }

        document.getElementById('wh-title').textContent = DAYS[id].label;
        document.getElementById('wh-date').textContent = weekData[dayKey];
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-workout').classList.remove('hidden');
        renderWorkout(); updateSummary();
    }

    function getTrendUI(curr, prev) {
        if (!prev || !prev.done || !curr.done) return '<span class="t-eq">──</span>';
        const cKg = parseFloat(curr.kg) || 0; const pKg = parseFloat(prev.kg) || 0;
        const cR = parseFloat(curr.reps) || 0; const pR = parseFloat(prev.reps) || 0;
        if (cKg > pKg) return '<span class="t-up">▲ CIĘŻAR</span>';
        if (cKg < pKg) return '<span class="t-down">▼ CIĘŻAR</span>';
        if (cR > pR) return '<span class="t-up">▲ POWT.</span>';
        if (cR < pR) return '<span class="t-down">▼ POWT.</span>';
        return '<span class="t-eq">〓</span>';
    }

    function toggleNoteBox(ei) {
        const box = document.getElementById(`note-box-${ei}`);
        box.classList.toggle('hidden');
    }

    function updateNote(ei, val) {
        const weekData = state.weeks[state.currentWeekIndex];
        const noteKey = `d${currentDayId}_e${ei}_note`;
        weekData[noteKey] = val;
        save();
    }

    function renderWorkout() {
        const day = DAYS[currentDayId];
        const weekData = state.weeks[state.currentWeekIndex];
        const prevWeekData = state.currentWeekIndex > 0 ? state.weeks[state.currentWeekIndex - 1] : null;

        document.getElementById('workout-scroll').innerHTML = day.exercises.map((ex, ei) => {
            const key = `d${currentDayId}_e${ei}`;
            const noteKey = `d${currentDayId}_e${ei}_note`;
            if(!weekData[key]) weekData[key] = Array.from({length:ex.sets}, () => ({kg:0, reps:0, done:false}));
            const sets = weekData[key];
            const currentNote = weekData[noteKey] || '';
            const prevSets = prevWeekData ? prevWeekData[key] : null;

            return `
                <div class="exercise-card">
                    <div class="exercise-header">
                        <div style="display:flex; align-items:center;">
                            <span class="tag-badge tag-${ex.tag}">${ex.tag}</span>
                            <span class="ex-title">${ex.name}</span>
                        </div>
                        <div class="ex-circle">${sets.filter(s=>s.done).length}/${ex.sets}</div>
                    </div>

                    <button class="btn-note-toggle ${currentNote ? 'active' : ''}" onclick="toggleNoteBox(${ei})">
                        💬 ${currentNote ? 'Edytuj notatkę' : 'Dodaj notatkę...'}
                    </button>

                    <div id="note-box-${ei}" class="note-box ${currentNote ? '' : 'hidden'}">
                        <textarea class="note-input" rows="2" placeholder="Best in the world?..." oninput="updateNote(${ei}, this.value)">${currentNote}</textarea>
                    </div>

                    <div>
                        ${sets.map((s, i) => {
                            const prev = prevSets && prevSets[i] ? prevSets[i] : null;
                            const prevTxt = prev ? `<b>${prev.kg}kg × ${prev.reps}</b>` : '—';
                            return `
                                <div class="set-row">
                                    <span style="font-size:12px; color:var(--text-dim); font-weight:800">S${i+1}</span>
                                    <div class="input-group"><input type="number" value="${s.kg||''}" placeholder="0" oninput="updateSet(${ei},${i},'kg',this.value)"><span>KG</span></div>
                                    <div class="input-group"><input type="number" value="${s.reps||''}" placeholder="0" oninput="updateSet(${ei},${i},'reps',this.value)"><span>POW</span></div>
                                    <button class="btn-check ${s.done?'done':''}" onclick="toggleSet(this,${ei},${i})">✓</button>
                                    <div class="set-info-bar">
                                        <span class="prev-label">Poprzednio: ${prevTxt}</span>
                                        <span class="trend-badge">${getTrendUI(s, prev)}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateSet(ei, i, field, val) { state.weeks[state.currentWeekIndex][`d${currentDayId}_e${ei}`][i][field] = parseFloat(val) || 0; save(); }
    
    function toggleSet(btn, ei, i) {
        const set = state.weeks[state.currentWeekIndex][`d${currentDayId}_e${ei}`][i];
        set.done = !set.done; save(); updateSummary(); renderWorkout();
    }

    function updateSummary() {
        const weekData = state.weeks[state.currentWeekIndex];
        let total = 0, done = 0;
        Object.keys(weekData).forEach(key => { if(key.startsWith(`d${currentDayId}_`) && !key.endsWith('_note')) weekData[key].forEach(s => { total++; if(s.done) done++; })});
        document.getElementById('s-done').textContent = done;
        document.getElementById('s-pct').textContent = total ? Math.round((done/total)*100)+'%' : '0%';
    }

    function goHome() { document.getElementById('screen-home').classList.remove('hidden'); document.getElementById('screen-workout').classList.add('hidden'); renderHome(); }

    function resetWorkout() {
        const weekData = state.weeks[state.currentWeekIndex];
        if (!weekData) return;

        delete weekData[`day_${currentDayId}_date`];

        Object.keys(weekData).forEach(key => {
            if (key.startsWith(`d${currentDayId}_`)) {
                delete weekData[key];
            }
        });

        save();
        openDay(currentDayId);
    }

    updateTimeline();
    renderHome();
</script>
</body>
</html>
